<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Steam Tracker Pro (Upgraded)</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #1b2838;
    color: #c7d5e0;
}

.topbar {
    background: #171a21;
    padding: 10px;
    display: flex;
    justify-content: space-between;
}

.container {
    padding: 20px;
    max-width: 1100px;
    margin: auto;
}

input {
    padding: 10px;
    width: 70%;
    background: #2a475e;
    border: none;
    color: white;
    outline: none;
}

.card {
    background: #2a475e;
    padding: 20px;
    margin-top: 20px;
    border-radius: 5px;
}

.result-item {
    padding: 10px;
    cursor: pointer;
    display:flex;
    align-items:center;
    gap:10px;
}

.result-item:hover {
    background: #1b2838;
}

.price { font-size: 28px; color: #66c0f4; }
.discount { color: #a4d007; }
.timer { color: gold; font-family: monospace; }

.game-img { width: 300px; }

.trending {
    display: inline-block;
    margin: 10px;
    cursor: pointer;
}

.trending img { width: 150px; }

#searchResults {
    position: absolute;
    background: #2a475e;
    width: 70%;
    max-height: 300px;
    overflow-y: auto;
    display: none;
    z-index: 999;
}
.loading {
    padding: 10px;
    color: #66c0f4;
}
</style>
</head>

<body>

<div class="topbar">
    <div>STEAM TRACKER PRO</div>
    <div id="clock"></div>
</div>

<div class="container">

<!-- SEARCH -->
<div style="position:relative;">
    <input id="search" placeholder="Search Steam games..." oninput="liveSearch()" autocomplete="off">
    <div id="searchResults"></div>
</div>

<!-- TRENDING -->
<div class="card">
    <h3>🔥 Trending Games</h3>
    <div id="trending"></div>
</div>

<!-- GAME -->
<div id="result" class="card" style="display:none;">
    <h2 id="title"></h2>
    <img id="image" class="game-img">
    <div class="price" id="price"></div>
    <div id="discount"></div>
    <a id="buyLink" target="_blank">Buy on Steam</a>
</div>

<!-- GRAPH -->
<div class="card">
    <h3>📊 Price History</h3>
    <canvas id="chart"></canvas>
</div>

</div>

<script>

/* ================= CLOCK ================= */
setInterval(() => {
    document.getElementById("clock").innerText =
        new Date().toLocaleString();
}, 1000);

/* ================= DATA ================= */
let steamIndex = [];
let fuse;
let searchTimeout;

/* ================= LOAD STEAM GAMES ================= */
async function loadSteamGames() {
    try {
        const res = await fetch("https://api.steampowered.com/ISteamApps/GetAppList/v2/");
        const data = await res.json();

        steamIndex = data.applist.apps.map(g => ({
            appid: g.appid,
            name: g.name
        }));

        // 🔥 Fuse.js fuzzy search setup
        fuse = new Fuse(steamIndex, {
            keys: ["name"],
            threshold: 0.35,
            ignoreLocation: true
        });

        console.log("Loaded games:", steamIndex.length);

    } catch (e) {
        console.error("Steam load failed", e);
    }
}
loadSteamGames();

/* ================= FAST SEARCH ================= */
function liveSearch() {
    clearTimeout(searchTimeout);

    searchTimeout = setTimeout(() => {
        const query = document.getElementById("search").value.trim();
        const box = document.getElementById("searchResults");

        if (!fuse || query.length < 2) {
            box.style.display = "none";
            return;
        }

        box.style.display = "block";
        box.innerHTML = "<div class='loading'>Searching...</div>";

        const results = fuse.search(query).slice(0, 8);

        box.innerHTML = "";

        if (!results.length) {
            box.innerHTML = "<div class='result-item'>No results</div>";
            return;
        }

        for (const r of results) {
            const game = r.item;

            const div = document.createElement("div");
            div.className = "result-item";

            div.innerHTML = `
                <img loading="lazy"
                     src="https://cdn.cloudflare.steamstatic.com/steam/apps/${game.appid}/capsule_184x69.jpg"
                     width="120">
                <div>${game.name}</div>
            `;

            div.onclick = () => {
                fetchGame(game.appid);
                box.style.display = "none";
            };

            box.appendChild(div);
        }

    }, 120);
}

/* ================= TRENDING ================= */
let trendingGames = [730, 570, 440, 1174180, 1091500, 620];

function loadTrending() {
    const container = document.getElementById("trending");

    trendingGames.forEach(id => {
        const div = document.createElement("div");
        div.className = "trending";

        const img = document.createElement("img");
        img.loading = "lazy";
        img.src = `https://cdn.cloudflare.steamstatic.com/steam/apps/${id}/capsule_184x69.jpg`;

        div.appendChild(img);
        div.onclick = () => fetchGame(id);

        container.appendChild(div);
    });
}
loadTrending();

/* ================= GAME FETCH ================= */
async function fetchGame(appid) {
    const res = await fetch(`https://store.steampowered.com/api/appdetails?appids=${appid}`);
    const data = await res.json();
    const game = data[appid].data;

    document.getElementById("result").style.display = "block";
    document.getElementById("title").innerText = game.name;

    document.getElementById("image").src =
        `https://cdn.cloudflare.steamstatic.com/steam/apps/${appid}/header.jpg`;

    if (!game.price_overview) {
        document.getElementById("price").innerText = "Free";
        return;
    }

    const price = game.price_overview.final / 100;
    const discount = game.price_overview.discount_percent;

    document.getElementById("price").innerText = "$" + price.toFixed(2);
    document.getElementById("discount").innerText =
        discount > 0 ? `-${discount}% OFF` : "No discount";

    document.getElementById("buyLink").href =
        `https://store.steampowered.com/app/${appid}`;

    generateChart(price);
}

/* ================= CHART ================= */
let chart;

function generateChart(price) {
    const ctx = document.getElementById("chart");

    const data = [
        price * 1.4,
        price * 1.2,
        price,
        price * 0.85,
        price
    ];

    if (chart) chart.destroy();

    chart = new Chart(ctx, {
        type: "line",
        data: {
            labels: ["High", "Drop", "Now", "Low", "Now"],
            datasets: [{
                label: "Price Trend (simulated)",
                data,
                borderColor: "#66c0f4"
            }]
        }
    });
}

</script>

</body>
</html>
